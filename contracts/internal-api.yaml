# Tekmar Internal API Specification
# Boundary 2: Application API (tekmar-api) ↔ Pipeline Service (tekmar-pipeline)
#
# Version: 1.1.0
# Status: Active
# Last updated: 2026-04-05
#
# Changelog:
#   1.1.0 (2026-04-05):
#     - Added multi-turn conversation support to POST /interpret.
#     - Added `conversation_history` optional field to /interpret request.
#     - Added `interpretation_clarification_needed` streaming event.
#     - Replaced the "future extension" note with full multi-turn specification.
#     - Pipeline remains stateless: conversation history is passed with each request.
#
#   1.0.0 (2026-03-19):
#     - Initial MVP specification.
#
# This specification defines the HTTP endpoints that the Application API
# uses to communicate with the Pipeline Service. This boundary is internal:
# it is never exposed to the public internet. The Pipeline Service listens
# on an internal network address accessible only to the Application API.
#
# Design principles:
#   - The Pipeline Service is stateless. It retains no information between
#     requests. Every request is self-contained.
#   - The Application API is the only client of this API. No other service
#     or user accesses these endpoints.
#   - POST /interpret uses streaming: the Application API sends a request
#     and receives a stream of newline-delimited JSON (NDJSON) events as
#     interpretation progresses. Text delta events stream the AI's analysis
#     token by token, followed by the final plan. The Application API
#     relays text deltas to the Interface Layer via WebSocket so the user
#     sees the AI thinking in real time.
#   - POST /execute uses streaming: the Application API sends a request and
#     receives a stream of newline-delimited JSON (NDJSON) events as
#     execution progresses. Each event represents a lifecycle moment
#     (step started, step completed, execution finished). The Application
#     API relays these events to the Interface Layer via WebSocket in
#     real time, so the user can watch execution as it happens.
#   - Credentials are never sent during interpretation. The Interpreter
#     needs only the tool catalog (what tools exist) to generate a plan.
#     Credentials are sent only during execution (when tools are actually
#     invoked against external systems). This minimizes credential exposure.
#
# Cross-references:
#   - data-model.yaml: queries table defines the fields that these endpoints
#     populate (query_plan, plan_summary, result_data, result_summary,
#     transparency_log, error_message, error_details, and lifecycle timestamps).
#   - mcp-tool-interface.yaml: defines the schemas referenced here, including
#     tool_catalog, query_plan, transparency_log, and credential_envelope.

spec_version: "1.0.0"

base_url: "http://tekmar-pipeline:8100"

# =============================================================================
# COMMON DEFINITIONS
# =============================================================================

common:
  # ---------------------------------------------------------------------------
  # Request Headers (all endpoints)
  # ---------------------------------------------------------------------------
  request_headers:
    Content-Type:
      value: "application/json"
      required: true
    X-Request-ID:
      type: string (UUID)
      required: true
      description: >
        Unique identifier for this request, generated by the Application
        API. Used for distributed tracing and log correlation between
        the Application API and the Pipeline Service. The Pipeline
        Service echoes this value in its response headers and includes
        it in all internal log entries related to this request.

  # ---------------------------------------------------------------------------
  # Error Response Format (all endpoints)
  # ---------------------------------------------------------------------------
  # Every endpoint returns errors in this format. The Pipeline Service
  # never returns HTML error pages or unstructured text.
  # ---------------------------------------------------------------------------
  error_response:
    description: >
      Standard error response format used by all endpoints when the
      request fails.
    content_type: "application/json"
    fields:
      error:
        type: object
        required: true
        fields:
          code:
            type: string
            required: true
            description: >
              Machine-readable error code. Hierarchical format:
              "{category}.{specific_error}".
            allowed_values:
              - interpretation.model_unavailable
              - interpretation.model_timeout
              - interpretation.unsatisfiable_request
              - interpretation.invalid_catalog
              - interpretation.internal_error
              - execution.plan_invalid
              - execution.tool_invocation_failed
              - execution.all_steps_failed
              - execution.timeout
              - execution.credential_error
              - execution.internal_error
              - output.formatting_error
              - output.internal_error
              - validation.invalid_request
              - validation.missing_field
              - validation.invalid_field
              - system.service_unavailable
              - system.internal_error
          message:
            type: string
            required: true
            description: >
              Human-readable error description. Safe to store in the
              database and display to the end user. Must not contain
              credential values, internal file paths, or stack traces.
          details:
            type: object
            required: false
            description: >
              Additional structured error context. Content varies by
              error code. For execution errors, may include the
              step_id that failed and the tool error code. For
              validation errors, may include the field name and
              the validation rule that was violated.
          stage:
            type: string
            required: true
            description: >
              The processing stage at which the error occurred.
              Maps directly to the queries.error_details structure
              in the data model.
            allowed_values:
              - interpretation
              - execution
              - output
              - validation
              - system

  # ---------------------------------------------------------------------------
  # Response Headers (all endpoints)
  # ---------------------------------------------------------------------------
  response_headers:
    Content-Type:
      value: "application/json"
    X-Request-ID:
      type: string (UUID)
      description: >
        Echoes the X-Request-ID from the request. If the request did
        not include one, the Pipeline Service generates its own.
    X-Processing-Time-Ms:
      type: integer
      description: >
        Wall-clock time in milliseconds that the Pipeline Service
        spent processing this request. Measured from request receipt
        to response dispatch.

# =============================================================================
# ENDPOINTS
# =============================================================================

endpoints:

  # ---------------------------------------------------------------------------
  # POST /interpret
  # ---------------------------------------------------------------------------
  # Sends a natural language query to the Interpreter for plan generation.
  # The Application API calls this when a user submits a new query.
  #
  # This endpoint uses NDJSON streaming, like /execute. The Pipeline
  # Service validates the request, then begins streaming events as the
  # Interpreter processes the query. The key event is interpretation_text_delta,
  # which streams the AI's analysis and reasoning token by token, allowing
  # the Application API to relay it to the user in real time (the user sees
  # text appearing progressively, like watching a chat message being typed).
  # The stream ends with either interpretation_plan_generated (success,
  # containing the complete plan) or interpretation_failed (error).
  #
  # Lifecycle: This call transitions the query from "interpreting" to
  # "awaiting_approval" (on success) or "failed" (on error).
  #
  # Credential note: This endpoint does NOT receive credentials.
  # The Interpreter needs only the tool catalog to understand what
  # operations are available. Credentials are sent only with the
  # /execute endpoint when tools are actually invoked.
  #
  # Multi-turn conversation support:
  #   The /interpret endpoint supports multi-turn conversation. On the
  #   first call, the API sends query_text and tool_catalog. The Pipeline
  #   streams analysis and either produces a plan (single-turn) or emits
  #   an interpretation_clarification_needed event (multi-turn). When the
  #   user responds, the API calls /interpret again with the original
  #   query_text, tool_catalog, AND a conversation_history array containing
  #   all previous turns. The Pipeline rebuilds context from the history
  #   and continues reasoning. This repeats until a plan is generated or
  #   interpretation fails. The Pipeline remains stateless — all context
  #   is passed in each request.
  #
  # Turn flow:
  #   1. API → POST /interpret { query_text, tool_catalog }
  #   2. Pipeline streams: started → text_deltas → clarification_needed
  #   3. API stores turn in DB, relays clarification to frontend via WS
  #   4. User responds via WS → API stores response
  #   5. API → POST /interpret { query_text, tool_catalog, conversation_history }
  #   6. Pipeline streams: started → text_deltas → plan_generated (or another clarification)
  #   7. Repeat until plan or failure.
  # ---------------------------------------------------------------------------
  interpret:
    method: POST
    path: /interpret
    description: >
      Interpret a natural language query and generate a structured
      query plan, streaming the AI's analysis in real time. The
      Pipeline Service sends the query text and tool catalog to the
      Interpreter (LLM) and streams back the AI's reasoning as text
      deltas, followed by either the complete query plan (single-turn)
      or a clarification question (multi-turn). When conversation
      history is provided, the Interpreter continues from where the
      previous turn left off, using the accumulated context to refine
      its understanding before producing a plan.
    timeout_seconds: 60
    timeout_note: >
      LLM interpretation typically completes in 3-15 seconds. The
      60-second timeout accommodates slow model responses and
      complex queries that require more reasoning. If the LLM does
      not respond within this window, the Pipeline Service sends
      an interpretation_error event and closes the stream.

    request:
      content_type: "application/json"
      fields:
        query_id:
          type: string (UUID)
          required: true
          description: >
            The ID of the query record in the database, created by
            the Application API before calling this endpoint. The
            Pipeline Service includes this in all streamed events so
            the Application API can correlate them with the correct
            database record.

        query_text:
          type: string
          required: true
          max_length: 10000
          description: >
            The user's natural language question, verbatim as
            submitted. Example: "Show me all AWS IAM users with
            console access who have not logged in within the last
            90 days and do not have MFA enabled."

        tool_catalog:
          type: tool_catalog
          required: true
          description: >
            The filtered set of available MCP tools for this query,
            assembled by the Application API based on the user's
            connected integrations. Conforms to the tool_catalog
            schema defined in mcp-tool-interface.yaml. Contains
            one entry per in-scope integration, each with its
            integration_id, server_type, display_name, and the
            list of tool_definition objects for that integration.

        query_plan_templates:
          type: array of query_plan
          required: false
          description: >
            An optional set of verified query plan templates that
            match common requests. If the user's question closely
            matches a template, the Interpreter may use it directly
            rather than generating a plan from scratch. Each
            template conforms to the query_plan schema defined in
            mcp-tool-interface.yaml. In the MVP, this may be an
            empty array or omitted entirely; the template library
            grows over time.

        conversation_history:
          type: array of conversation_turn
          required: false
          description: >
            The conversation history from previous turns of a
            multi-turn interpretation. Omitted on the first turn
            (single-turn behavior). When present, the Interpreter
            uses this history to rebuild context and continue
            reasoning from where the previous turn ended.

            Each turn is an object with a role ("assistant" or
            "user") and role-specific fields:

            Assistant turns contain:
            - role: "assistant"
            - content: string — the AI's analysis text from that turn
              (accumulated text_delta values)
            - clarification: object (optional) — if the assistant
              asked a clarification question, contains:
              - clarification_id: string (UUID)
              - question: string
              - options: array of { option_id, label, description? }
                (optional)
              - allows_free_text: boolean

            User turns contain:
            - role: "user"
            - response_type: "option_selection" | "free_text"
            - selected_option_id: string (when response_type is
              option_selection)
            - text: string (when response_type is free_text, or
              optional additional context with option_selection)

            The history alternates: assistant turn, user turn,
            assistant turn, user turn, etc. The first turn is
            always from the assistant. The last turn before the
            current request is always from the user (the user's
            response that triggered this continuation).

            The Pipeline Service uses this history to construct
            the LLM's conversation context, prepending the
            previous analysis and Q&A before generating the
            current turn's response.

    response:
      # -----------------------------------------------------------------
      # Pre-stream errors (returned BEFORE streaming begins)
      # -----------------------------------------------------------------
      pre_stream_errors:
        description: >
          These errors are returned as standard HTTP JSON responses
          before the NDJSON stream starts. If any of these errors
          occur, no streaming happens.
        errors:
          - status_code: 400
            error_code: validation.invalid_request
            description: >
              The request body is malformed or missing required fields.

          - status_code: 400
            error_code: interpretation.invalid_catalog
            description: >
              The tool catalog is empty or contains no valid tool
              definitions. The Interpreter cannot generate a plan
              without available tools.

      # -----------------------------------------------------------------
      # Streaming response (NDJSON event stream)
      # -----------------------------------------------------------------
      stream:
        status_code: 200
        content_type: "application/x-ndjson"
        description: >
          Once validation passes, the Pipeline Service responds with
          HTTP 200 and begins streaming NDJSON events. Each line is
          a complete JSON object followed by a newline (\n).

          The stream always begins with an interpretation_started
          event and always ends with exactly one terminal event:
          interpretation_plan_generated, interpretation_failed,
          interpretation_clarification_needed, or
          interpretation_error.

          Between these, interpretation_text_delta events stream the
          AI's analysis text token by token. The Application API
          relays these to the Interface Layer via WebSocket so the
          user sees the AI's thinking appear in real time.

          In multi-turn conversation, interpretation_clarification_needed
          ends the current stream. The Application API stores the
          conversation turn and waits for the user's response.
          When the user responds, a new POST /interpret call with
          conversation_history starts a fresh stream for the next turn.

        events:

          interpretation_started:
            description: >
              First event in the stream. Indicates the Interpreter
              has received the query and begun processing.
            fields:
              event: { type: string, value: "interpretation_started" }
              query_id: { type: string (UUID) }
              timestamp: { type: string (ISO 8601 datetime) }

          interpretation_text_delta:
            description: >
              Streams a chunk of the AI's analysis and reasoning
              text. These events arrive rapidly as the LLM generates
              tokens. The Application API relays each delta to the
              Interface Layer via WebSocket, where the text is
              appended to a growing display, creating the effect of
              watching the AI think in real time. The cumulative
              text across all deltas forms the AI's complete
              analysis of the query — what it understood, what
              tools it plans to use, and why.
            fields:
              event: { type: string, value: "interpretation_text_delta" }
              query_id: { type: string (UUID) }
              text_delta:
                type: string
                description: >
                  A chunk of the AI's response text. Typically a
                  few tokens (1-20 characters). The Application API
                  appends this to the cumulative interpretation text
                  and relays it to the WebSocket.
              timestamp: { type: string (ISO 8601 datetime) }

          interpretation_clarification_needed:
            terminal: true
            description: >
              Terminal event for this turn of interpretation. The
              Interpreter has determined it needs additional
              information from the user before it can generate a
              plan. The Application API stores this as a
              conversation turn, relays the clarification to the
              frontend via WebSocket (as query_clarification_needed),
              and waits for the user's response. When the user
              responds, the API calls POST /interpret again with
              the conversation_history.

              This event ends the current streaming response. A new
              /interpret call with conversation_history starts a
              new streaming response for the next turn. The Pipeline
              remains stateless between turns.
            fields:
              event: { type: string, value: "interpretation_clarification_needed" }
              query_id: { type: string (UUID) }
              clarification_id:
                type: string (UUID)
                description: >
                  Unique identifier for this clarification request.
                  Used to correlate the user's response.
              question:
                type: string
                description: >
                  The AI's clarification question in natural language.
                  May contain markdown formatting.
              options:
                type: array of object
                required: false
                description: >
                  Structured choices for the user. Each option has
                  an option_id (string), label (string), and optional
                  description (string). If absent, the user should
                  respond with free text.
              allows_free_text:
                type: boolean
                default: true
                description: >
                  Whether the user can type a free-text response
                  instead of selecting an option.
              full_interpretation_text:
                type: string
                description: >
                  The complete interpretation text from this turn
                  (all text_delta values concatenated). The
                  Application API stores this as the assistant's
                  content in the conversation history.
              timestamp: { type: string (ISO 8601 datetime) }

          interpretation_plan_generated:
            terminal: true
            description: >
              Terminal success event. The Interpreter has generated
              a complete query plan. Contains the full plan object
              and summary. The Application API stores the plan in
              the database, updates the query status to
              "awaiting_approval", and sends the plan to the user
              for review.
            fields:
              event: { type: string, value: "interpretation_plan_generated" }
              query_id: { type: string (UUID) }
              query_plan:
                type: query_plan
                description: >
                  The generated query plan. Conforms to the
                  query_plan schema in mcp-tool-interface.yaml.
              plan_summary:
                type: string
                description: >
                  Human-readable explanation of what the plan will
                  do. Stored in queries.plan_summary.
              estimated_duration_seconds:
                type: integer
                description: >
                  Estimated execution time based on tool call count.
              full_interpretation_text:
                type: string
                description: >
                  The complete interpretation text (all text_delta
                  values concatenated). Provided as a convenience
                  so the Application API does not need to accumulate
                  deltas. This is the AI's full analysis that the
                  user saw streaming in real time.
              timestamp: { type: string (ISO 8601 datetime) }

          interpretation_failed:
            terminal: true
            description: >
              Terminal event when interpretation fails in a way the
              Interpreter can explain (unsatisfiable request, model
              refusal, or a recognized limitation).
            fields:
              event: { type: string, value: "interpretation_failed" }
              query_id: { type: string (UUID) }
              error_code:
                type: string
                allowed_values:
                  - interpretation.unsatisfiable_request
                  - interpretation.model_refused
                  - interpretation.internal_error
              error_message:
                type: string
                description: >
                  Human-readable explanation of why interpretation
                  failed. Example: "This query requires access to
                  Jira for ticket information, but no Jira
                  integration is connected."
              full_interpretation_text:
                type: string
                required: false
                description: >
                  Whatever interpretation text was generated before
                  the failure. May be empty if the failure occurred
                  immediately.
              timestamp: { type: string (ISO 8601 datetime) }

          interpretation_error:
            terminal: true
            description: >
              Terminal event for unexpected infrastructure errors
              (LLM provider unavailable, timeout, internal errors).
            fields:
              event: { type: string, value: "interpretation_error" }
              query_id: { type: string (UUID) }
              error_code:
                type: string
                allowed_values:
                  - interpretation.model_unavailable
                  - interpretation.model_timeout
                  - interpretation.internal_error
              error_message: { type: string }
              timestamp: { type: string (ISO 8601 datetime) }

  # ---------------------------------------------------------------------------
  # POST /execute
  # ---------------------------------------------------------------------------
  # Sends an approved query plan to the Execution Engine for execution.
  # The Application API calls this after the user approves the plan.
  #
  # This endpoint uses NDJSON (newline-delimited JSON) streaming. The
  # Pipeline Service validates the request, then begins streaming events
  # as execution progresses. Each event is a JSON object followed by a
  # newline character (\n). The Application API reads events as they
  # arrive and relays them to the Interface Layer via WebSocket, so the
  # user can watch execution in real time.
  #
  # Lifecycle: This call transitions the query from "approved" to
  # "executing", then to "completed" (on success), "failed" (on total
  # failure), or "completed" with partial results.
  #
  # Credential note: This endpoint receives credentials because the
  # Execution Engine needs them to invoke MCP tools against the
  # customer's external systems.
  #
  # Error handling: Pre-execution errors (invalid plan, missing
  # credentials) return standard HTTP error responses BEFORE streaming
  # begins. Once streaming starts (HTTP 200 with content-type
  # application/x-ndjson), errors are delivered as error events within
  # the stream. The stream always ends with a terminal event
  # (execution_completed, execution_failed, or execution_error).
  # ---------------------------------------------------------------------------
  execute:
    method: POST
    path: /execute
    description: >
      Execute an approved query plan with real-time streaming of
      execution progress. The Pipeline Service validates the request,
      then streams NDJSON events as each tool invocation starts,
      completes, or fails. The final event contains the complete
      results, transparency log, and summary.
    timeout_seconds: 300
    timeout_note: >
      Execution time varies significantly depending on the number
      of tool calls, external API response times, and data volume.
      The 300-second timeout applies to the entire stream. If
      execution exceeds this, the Pipeline Service sends an
      execution_timeout event and closes the stream.

    request:
      content_type: "application/json"
      fields:
        query_id:
          type: string (UUID)
          required: true
          description: >
            The ID of the query record. Used for transparency log
            correlation and included in all streamed events.

        query_plan:
          type: query_plan
          required: true
          description: >
            The approved query plan to execute. Conforms to the
            query_plan schema defined in mcp-tool-interface.yaml.
            This is the same plan object that was returned by the
            /interpret endpoint, stored in the database, shown to
            the user for approval, and now sent back for execution.
            The Pipeline Service does not retain the plan between
            the /interpret and /execute calls because it is
            stateless.

        credentials:
          type: object
          required: true
          description: >
            A map of integration_id to credential_envelope. Contains
            the credentials for every integration referenced in
            the query plan. The Application API decrypts (or
            generates temporary credentials for) each integration
            and assembles this map before calling /execute.
            The Pipeline Service distributes the correct
            credentials to each MCP tool invocation based on the
            integration_id in each plan step.
          structure: >
            {
              "<integration_id>": {
                "server_type": "<string>",
                "credential_mode": "broker" | "direct",
                "credential_data": { ... }
              },
              ...
            }
          notes: >
            Each value conforms to the credential_envelope schema
            defined in mcp-tool-interface.yaml. The credential_data
            structure varies by server_type as defined in the
            credential_structures section of that specification.
            Every integration_id referenced in any plan step MUST
            have a corresponding entry in this map. If a credential
            is missing, the Pipeline Service returns an HTTP error
            response before streaming begins.

    response:
      # -----------------------------------------------------------------
      # Pre-execution errors (returned BEFORE streaming begins)
      # -----------------------------------------------------------------
      pre_stream_errors:
        description: >
          These errors are returned as standard HTTP JSON responses
          before the NDJSON stream starts. If any of these errors
          occur, no streaming happens at all.
        errors:
          - status_code: 400
            error_code: validation.invalid_request
            description: >
              The request body is malformed or missing required fields.

          - status_code: 400
            error_code: execution.plan_invalid
            description: >
              The query plan is structurally invalid: references
              tools not in the catalog, has circular step
              dependencies, or violates the plan schema.

          - status_code: 400
            error_code: execution.credential_error
            description: >
              Credentials are missing for one or more integrations
              referenced in the plan, or the credential format
              does not match the expected structure for the
              server_type. No steps are executed.

      # -----------------------------------------------------------------
      # Streaming response (NDJSON event stream)
      # -----------------------------------------------------------------
      stream:
        status_code: 200
        content_type: "application/x-ndjson"
        description: >
          Once validation passes, the Pipeline Service responds with
          HTTP 200 and begins streaming NDJSON events. Each line is
          a complete JSON object followed by a newline (\n). The
          Application API reads each line, parses it, and relays it
          to the Interface Layer via WebSocket.

          The stream always begins with an execution_started event
          and always ends with exactly one terminal event:
          execution_completed, execution_failed, or execution_error.
          Between these, step_started and step_completed/step_failed
          events are emitted for each tool invocation.

        # ---------------------------------------------------------------
        # Event Types
        # ---------------------------------------------------------------
        events:

          execution_started:
            description: >
              First event in the stream. Indicates the Execution
              Engine has begun processing the plan.
            fields:
              event: { type: string, value: "execution_started" }
              query_id: { type: string (UUID) }
              plan_id: { type: string (UUID) }
              total_steps: { type: integer, description: "Number of steps in the plan." }
              timestamp: { type: string (ISO 8601 datetime) }

          step_started:
            description: >
              Emitted when the Execution Engine begins executing a
              plan step. The user sees this as a new line appearing
              in the live execution log.
            fields:
              event: { type: string, value: "step_started" }
              query_id: { type: string (UUID) }
              step_id: { type: string }
              step_index: { type: integer, description: "1-based position in the plan." }
              tool_name: { type: string, description: "The MCP tool being invoked." }
              tool_display_name: { type: string, description: "Human-readable tool name." }
              integration_display_name: { type: string, description: "Which integration is being queried." }
              description: { type: string, description: "The step description from the plan." }
              timestamp: { type: string (ISO 8601 datetime) }

          step_completed:
            description: >
              Emitted when a plan step finishes successfully. The
              user sees the step entry update with duration and
              a summary of what was returned.
            fields:
              event: { type: string, value: "step_completed" }
              query_id: { type: string (UUID) }
              step_id: { type: string }
              status: { type: string, value: "success" }
              duration_ms: { type: integer }
              record_count: { type: integer, description: "Number of records returned by this step, if applicable." }
              summary: { type: string, description: "Brief summary of what this step returned. Example: '47 IAM users retrieved'." }
              data_hash: { type: string, description: "SHA-256 hash of the returned data." }
              timestamp: { type: string (ISO 8601 datetime) }

          step_failed:
            description: >
              Emitted when a plan step fails. The user sees the
              step entry update with an error indicator.
            fields:
              event: { type: string, value: "step_failed" }
              query_id: { type: string (UUID) }
              step_id: { type: string }
              status: { type: string, value: "error" }
              duration_ms: { type: integer }
              error_code: { type: string, description: "Tool error code from the MCP tool invocation response." }
              error_message: { type: string, description: "Human-readable error description." }
              retryable: { type: boolean }
              timestamp: { type: string (ISO 8601 datetime) }

          execution_completed:
            terminal: true
            description: >
              Final event when execution succeeds (all steps passed)
              or partially succeeds (some steps passed, some failed).
              Contains the complete results and transparency log.
              The Application API stores result_data in
              queries.result_data, result_summary in
              queries.result_summary, and transparency_log in
              queries.transparency_log.
            fields:
              event: { type: string, value: "execution_completed" }
              query_id: { type: string (UUID) }
              execution_status:
                type: string
                allowed_values: [completed, partial]
                description: >
                  "completed" means all steps succeeded. "partial"
                  means some steps failed but usable data was
                  collected from the successful steps.
              result_data:
                type: result_data
                description: >
                  The structured query results produced by the
                  Output Engine. Conforms to the result_data schema
                  defined in this specification. Stored in
                  queries.result_data.
              result_summary:
                type: string
                description: >
                  Human-readable summary. Stored in
                  queries.result_summary.
              transparency_log:
                type: transparency_log
                description: >
                  Complete execution log. Conforms to the
                  transparency_log schema in mcp-tool-interface.yaml.
                  Stored in queries.transparency_log.
              export_csv:
                type: string
                required: false
                description: >
                  CSV-formatted results for download. The
                  Application API stores this as a file in object
                  storage. May be absent if results are not
                  suitable for tabular representation.
              timestamp: { type: string (ISO 8601 datetime) }

          execution_failed:
            terminal: true
            description: >
              Final event when execution fails entirely (no usable
              data collected). Contains the transparency log showing
              what was attempted.
            fields:
              event: { type: string, value: "execution_failed" }
              query_id: { type: string (UUID) }
              execution_status: { type: string, value: "failed" }
              error_code: { type: string }
              error_message: { type: string }
              transparency_log:
                type: transparency_log
                required: false
                description: >
                  Partial transparency log showing what was attempted
                  before failure. May be absent if the failure
                  occurred before any tool invocations.
              timestamp: { type: string (ISO 8601 datetime) }

          execution_error:
            terminal: true
            description: >
              Final event for unexpected errors during execution
              (internal errors, timeouts). The Pipeline Service
              sends this and closes the stream.
            fields:
              event: { type: string, value: "execution_error" }
              query_id: { type: string (UUID) }
              error_code:
                type: string
                allowed_values:
                  - execution.timeout
                  - execution.internal_error
              error_message: { type: string }
              transparency_log:
                type: transparency_log
                required: false
              timestamp: { type: string (ISO 8601 datetime) }

  # ---------------------------------------------------------------------------
  # GET /health
  # ---------------------------------------------------------------------------
  # Health check endpoint used by the Application API and by deployment
  # infrastructure to verify the Pipeline Service is operational.
  # ---------------------------------------------------------------------------
  health:
    method: GET
    path: /health
    description: >
      Returns the health status of the Pipeline Service, including
      connectivity to the LLM provider and the status of MCP servers.
    timeout_seconds: 10

    request:
      content_type: null
      fields: null

    response:
      success:
        status_code: 200
        content_type: "application/json"
        fields:
          status:
            type: string
            required: true
            allowed_values:
              - healthy
              - degraded
              - unhealthy
            description: >
              "healthy" means all components are operational.
              "degraded" means the service is running but one or
              more dependencies (LLM provider, MCP servers) are
              unavailable. "unhealthy" means the service cannot
              process queries.

          version:
            type: string
            required: true
            description: >
              The Pipeline Service's semantic version. Example:
              "1.0.0".

          uptime_seconds:
            type: integer
            required: true
            description: >
              Seconds since the Pipeline Service process started.

          components:
            type: object
            required: true
            description: >
              Health status of individual Pipeline Service
              dependencies.
            fields:
              llm_provider:
                type: object
                required: true
                fields:
                  status:
                    type: string
                    allowed_values: [healthy, unhealthy, unknown]
                  provider:
                    type: string
                    description: >
                      The configured LLM provider name. Example:
                      "anthropic", "openai", "ollama".
                  last_check_at:
                    type: string (ISO 8601 datetime)

              mcp_servers:
                type: array of object
                required: true
                description: >
                  One entry per registered MCP server.
                fields:
                  server_type:
                    type: string
                    description: >
                      The MCP server type. Example: "aws",
                      "google_workspace", "github".
                  status:
                    type: string
                    allowed_values: [healthy, unhealthy, unknown]
                  tool_count:
                    type: integer
                    description: >
                      Number of tools this server exposes.
                  last_check_at:
                    type: string (ISO 8601 datetime)

# =============================================================================
# RESULT DATA SCHEMA
# =============================================================================
# Defines the structure of the result_data field returned by /execute
# and stored in queries.result_data (JSONB) in the data model.
#
# The Output Engine produces this structure. The Interface Layer consumes
# it for display. The Application API transports it but does not
# interpret its contents.
# =============================================================================

result_data:
  description: >
    The structured output of a query execution, produced by the
    Output Engine. Designed to be directly renderable by the
    Interface Layer without further transformation.
  fields:
    format_version:
      type: string
      required: true
      default: "1.0"
      description: >
        Schema version of the result format. Allows the Interface
        Layer to handle results from different Output Engine versions.

    tables:
      type: array of result_table
      required: true
      description: >
        The query results organized as one or more tables. Most
        queries produce a single table. Multi-step queries that
        combine data from different sources may produce multiple
        tables. The Interface Layer renders each table as a
        separate section in the results view.

    metadata:
      type: object
      required: true
      description: >
        Contextual information about the results as a whole.
      fields:
        total_records:
          type: integer
          required: true
          description: >
            Total number of records across all tables. Displayed
            in the results header.

        integrations_queried:
          type: array of object
          required: true
          description: >
            Summary of which integrations contributed to the results.
          fields:
            integration_id:
              type: string (UUID)
            display_name:
              type: string
            server_type:
              type: string

        execution_duration_ms:
          type: integer
          required: true
          description: >
            How long execution took, for display to the user.

result_table:
  description: >
    A single table of results within a query's result_data. Contains
    a title, column definitions, and rows of data.
  fields:
    table_id:
      type: string
      required: true
      description: >
        Unique identifier for this table within the result set.
        Convention: "table_1", "table_2", etc.

    title:
      type: string
      required: true
      description: >
        A descriptive title for this table. Displayed as the
        section header in the results view. Example: "IAM users
        without MFA and no recent login".

    description:
      type: string
      required: false
      description: >
        Additional context about what this table shows and why
        it is relevant. Displayed below the title.

    columns:
      type: array of result_column
      required: true
      min_items: 1
      description: >
        The column definitions for this table, in display order.

    rows:
      type: array of array
      required: true
      description: >
        The data rows. Each row is an array of values corresponding
        positionally to the columns array. Values are strings,
        numbers, booleans, or null.

    row_count:
      type: integer
      required: true
      description: >
        The number of rows in this table. Redundant with
        rows.length but provided explicitly for convenience.

    source_step_ids:
      type: array of string
      required: true
      description: >
        The plan step_ids that produced the data in this table.
        Enables the Interface Layer to link result tables back
        to specific steps in the query plan and their
        corresponding transparency log entries.

result_column:
  description: >
    A column definition within a result table.
  fields:
    key:
      type: string
      required: true
      description: >
        Machine-readable column identifier. Used for CSV export
        headers and programmatic access. Convention: snake_case.
        Example: "username", "last_login_at", "mfa_enabled".

    label:
      type: string
      required: true
      description: >
        Human-readable column header. Displayed in the table UI.
        Example: "Username", "Last login", "MFA enabled".

    data_type:
      type: string
      required: true
      allowed_values:
        - string
        - number
        - boolean
        - datetime
        - array
      description: >
        The data type of values in this column. The Interface
        Layer uses this for formatting (e.g., rendering datetime
        values with appropriate formatting, displaying booleans
        as checkmarks).

    sortable:
      type: boolean
      required: false
      default: true
      description: >
        Whether the Interface Layer should allow sorting by this
        column.

# =============================================================================
# QUERY LIFECYCLE STATE TRANSITIONS
# =============================================================================
# Documents how the internal API endpoints map to query lifecycle state
# transitions in the data model. The Application API is responsible for
# updating the query status in the database at each transition.
#
# This is reference documentation, not an endpoint definition. It exists
# to ensure that the Application API and the Pipeline Service agree on
# the meaning of each lifecycle state.
# =============================================================================

lifecycle_transitions:
  description: >
    Maps internal API interactions to query status transitions in
    the database. The Application API updates queries.status and
    the corresponding timestamp field at each transition.

  transitions:
    - trigger: "Application API creates query record"
      from_status: null
      to_status: interpreting
      timestamp_field: submitted_at
      note: >
        Happens before the /interpret call. The Application API
        creates the query record in the database with status
        "interpreting" and the submitted_at timestamp, then calls
        /interpret with the new query_id.

    - trigger: "POST /interpret stream emits interpretation_plan_generated"
      from_status: interpreting
      to_status: awaiting_approval
      timestamp_field: plan_generated_at
      database_updates:
        - "queries.query_plan = event.query_plan"
        - "queries.plan_summary = event.plan_summary"
      note: >
        The Application API stores the plan and summary, updates
        status to "awaiting_approval", and sets plan_generated_at.
        The query is now waiting for the user to approve or reject
        the plan.

    - trigger: "POST /interpret stream emits interpretation_failed or interpretation_error"
      from_status: interpreting
      to_status: failed
      timestamp_field: completed_at
      database_updates:
        - "queries.error_message = event.error_message"
        - "queries.error_details = { stage: 'interpretation', code: event.error_code }"
      note: >
        Interpretation failed. The Application API stores the
        error information and marks the query as failed.

    - trigger: "User approves the plan"
      from_status: awaiting_approval
      to_status: approved
      timestamp_field: approved_at
      note: >
        Happens in the Application API when the user confirms the
        plan. The Application API updates status to "approved" and
        sets approved_at, then calls POST /execute.

    - trigger: "User rejects the plan"
      from_status: awaiting_approval
      to_status: rejected
      timestamp_field: completed_at
      note: >
        The user decided not to execute the plan. The Application
        API updates status to "rejected" and sets completed_at.
        No call is made to the Pipeline Service.

    - trigger: "Application API calls POST /execute"
      from_status: approved
      to_status: executing
      timestamp_field: execution_started_at
      note: >
        The Application API updates status to "executing" and
        sets execution_started_at immediately before sending the
        /execute request. The Application API then reads the
        NDJSON event stream and relays events to the Interface
        Layer via WebSocket.

    - trigger: "POST /execute stream emits execution_completed with status 'completed'"
      from_status: executing
      to_status: completed
      timestamp_field: completed_at
      database_updates:
        - "queries.result_data = event.result_data"
        - "queries.result_summary = event.result_summary"
        - "queries.transparency_log = event.transparency_log"

    - trigger: "POST /execute stream emits execution_completed with status 'partial'"
      from_status: executing
      to_status: completed
      timestamp_field: completed_at
      database_updates:
        - "queries.result_data = event.result_data"
        - "queries.result_summary = event.result_summary"
        - "queries.transparency_log = event.transparency_log"
        - "queries.error_message = 'Some steps failed. Partial results are shown.'"
        - "queries.error_details = { stage: 'execution', partial: true }"
      note: >
        Partial results are stored as completed queries with an
        error_message indicating incomplete results. The user sees
        whatever data was collected alongside the error note.

    - trigger: "POST /execute stream emits execution_failed or execution_error"
      from_status: executing
      to_status: failed
      timestamp_field: completed_at
      database_updates:
        - "queries.error_message = event.error_message"
        - "queries.error_details = { stage: 'execution', code: event.error_code }"
        - "queries.transparency_log = event.transparency_log (if present)"
      note: >
        Total execution failure. The transparency log, if available,
        is still stored so the user can see what was attempted.